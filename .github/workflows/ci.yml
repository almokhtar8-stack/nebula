name: Nebula CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check nebula/ tests/

      - name: Format check with ruff
        run: ruff format --check nebula/ tests/

      - name: Type check with mypy
        run: mypy nebula/ --ignore-missing-imports
        continue-on-error: true  # advisory in MVP; tighten in v0.2

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=nebula --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  integration-smoke:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Run full pipeline against synthetic data
        run: |
          nebula run \
            --vcf data/synthetic/sample_001.vcf \
            --meta data/synthetic/sample_001_meta.json \
            --whitelist data/whitelist/whitelist_v0_1.csv \
            --ruleset rulesets/v0_1.yml \
            --out /tmp/nebula_out/

      - name: Verify report.json exists and has insights
        run: |
          python -c "
          import json, sys
          with open('/tmp/nebula_out/report.json') as f:
              r = json.load(f)
          assert r['sample_id'] == 'SAMPLE_001', 'sample_id mismatch'
          assert r['summary']['total_insights'] >= 5, 'too few insights'
          assert len(r['disclaimers']) >= 5, 'missing disclaimers'
          print(f'✓ Report valid: {r[\"summary\"][\"total_insights\"]} insights, '
                f'{len(r[\"watchlist\"])} in watchlist')
          "

      - name: Surveillance dry-run smoke test
        run: |
          # Dry run only — no real network calls needed for smoke test
          # (real surveillance requires network; tested with mocks in pytest)
          python -c "
          from nebula.surveillance.models import ReviewQueue, SurveillanceCandidate, EvidenceSignal, DataSource
          from nebula.surveillance.queue import save_queue, load_queue, get_summary_report
          from pathlib import Path
          import tempfile, os

          # Test queue save/load roundtrip
          with tempfile.TemporaryDirectory() as tmp:
              q = ReviewQueue()
              c = SurveillanceCandidate(
                  candidate_id='smoke_test_001',
                  source=DataSource.GWAS_CATALOG,
                  rsid='rs762551',
                  trait='Caffeine metabolism',
                  gene='CYP1A2',
                  signal=EvidenceSignal.STRONG_CANDIDATE,
                  auto_score=85,
              )
              q.candidates.append(c)
              path = Path(tmp) / 'queue.json'
              save_queue(q, path)
              loaded = load_queue(path)
              summary = get_summary_report(loaded)
              assert summary['pending_review'] == 1
              assert summary['strong_candidates_pending'] == 1
              print('✓ Surveillance queue roundtrip OK')
          "
